# Copy to config.yaml and adjust. Secrets stay in .env only.

api:
  base_url: "https://api.ondoperps.xyz"

# Markets to rotate (or single market). Ondo symbols:
#   XAU-USD.P = Gold 20x max
#   XAG-USD.P = Silver 20x max
markets:
  - "XAU-USD.P"
  - "XAG-USD.P"

# Cycle mode: "rotate" = alternate markets each cycle, "all" not used yet
market_mode: "rotate"

leverage: 20

# Position sizing
sizing:
  # Use at most this fraction of available margin on EACH account
  margin_usage_pct: 40.0
  # Cap notional per side (USD). 0 = no extra cap beyond margin
  max_notional_usd: 0
  # Minimum base size after rounding (skip cycle if below)
  min_base_size: 0.001

# Entry / close price targets
strategy:
  # B/D close offset = UNDERLYING price % (not ROI).
  # 20x + want ~1% ROI per side → price move = 1/20 = 0.05%
  # Example: entry 4100 → B/D at 4100 * 1.0005 = 4102.05
  close_price_pct: 0.05
  # up = B/D at entry*(1+pct/100); down = entry*(1-pct/100)
  close_direction: "up"
  # strict_maker = postOnly limits (preferred). No exchange TP/SL used.
  # 5th order (E): only if one account is fully flat and the other still open —
  #   cancel lagging B/D and re-place at current book so residual position closes.
  order_mode: "strict_maker"
  # How many ticks inside/at book for aggressive limits (0 = at best bid/ask)
  book_offset_ticks: 0
  # Partial-fill / size equality tolerance in base units
  size_tolerance: 0.0001
  # Seconds between status polls
  poll_interval_sec: 0.5
  # Unfilled lagging order: wait this long then cancel → reprice
  reprice_sec: 3.0
  # Pause between completed cycles
  cycle_pause_sec: 2.0
  # Max reprice attempts per stage before logging warning (0 = unlimited)
  max_reprice_attempts: 0

risk:
  # Require estimated liq distance from entry >= this % (fail → shrink or skip)
  min_liq_distance_pct: 7.0
  # If true, reduce size until liq distance ok; if false, skip the cycle
  shrink_to_fit_liq: true
  # Abort bot if either account under liquidation flag
  stop_on_liquidation: true

bot:
  dry_run: false
  log_level: "INFO"
  # Prefix for clientOrderId so we only cancel our own orders
  order_prefix: "dn2_"
  # Max cycles then exit (0 = run forever)
  max_cycles: 0
