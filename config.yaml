api:
  base_url: "https://api.ondoperps.xyz"

markets:
  - "XAU-USD.P"
  - "XAG-USD.P"

market_mode: "rotate"

leverage: 20

sizing:
  margin_usage_pct: 40.0
  max_notional_usd: 0
  min_base_size: 0.001

strategy:
  # UNDERLYING price move for B/D close, in percent of entry price.
  # At 20x: 1% position ROI ≈ 0.05% price move (1 / 20 = 0.05).
  # NOT 1% of gold/silver price (that would be ~20% ROI).
  close_price_pct: 0.05
  close_direction: "up"
  # strict_maker | fast_limit — no exchange TP/SL; all bot closes are limit orders
  order_mode: "strict_maker"
  book_offset_ticks: 0
  size_tolerance: 0.0001
  poll_interval_sec: 0.5
  # Timer for: entry imbalance, dual-book close reprice, E-only lag reprice.
  # B/D at target REST until target hit+stuck (dual) or one-sided (E).
  reprice_sec: 3.0
  cycle_pause_sec: 2.0
  max_reprice_attempts: 0

risk:
  min_liq_distance_pct: 7.0
  # Pre-trade approx cannot guarantee 7% at 20x; post-fill liq is logged.
  shrink_to_fit_liq: true
  stop_on_liquidation: true

bot:
  dry_run: false
  log_level: "INFO"
  order_prefix: "dn2_"
  max_cycles: 0
